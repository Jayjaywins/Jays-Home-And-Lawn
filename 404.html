<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Jay's Home & Lawn</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');

  :root{
    --bg:#FAF9F3;
    --dark:#17301F;
    --mid:#3C6E41;
    --bright:#7CB342;
    --lime:#C7D96B;
    --text:#1A2419;
    --white:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background-image: repeating-linear-gradient(115deg, var(--mid) 0px, var(--mid) 64px, #467A49 64px, #467A49 128px);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Inter',sans-serif;
    position:relative;
    padding:24px;
  }
  body::after{
    content:"";
    position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(23,48,31,0.25) 0%, rgba(23,48,31,0.65) 100%);
  }
  .card{
    position:relative;
    z-index:2;
    background:var(--white);
    border-radius:16px;
    padding:52px 44px;
    max-width:460px;
    width:100%;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
  }
  .logo{width:64px;height:64px;border-radius:50%;margin:0 auto 20px;display:block;}
  .code{
    font-family:'JetBrains Mono',monospace;
    font-size:0.85rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--mid);
    margin-bottom:10px;
  }
  h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    color:var(--dark);
    font-size:1.6rem;
    margin-bottom:14px;
    letter-spacing:-0.02em;
  }
  p{
    color:#4A594B;
    font-size:0.98rem;
    margin-bottom:28px;
    line-height:1.5;
  }
  .btn{
    display:inline-block;
    padding:12px 26px;
    border-radius:6px;
    font-weight:600;
    font-size:0.92rem;
    background:var(--mid);
    color:var(--white);
    text-decoration:none;
    transition:background .15s ease, transform .15s ease;
  }
  .btn:hover{background:var(--dark);transform:translateY(-1px);}
  .phone{
    display:block;
    margin-top:18px;
    font-family:'JetBrains Mono',monospace;
    font-size:0.88rem;
    color:var(--mid);
    text-decoration:none;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="Jay's Home and Lawn logo">
    <div class="code">404</div>
    <h1>This yard hasn't been mowed yet.</h1>
    <p>The page you're looking for doesn't exist — but the rest of the lawn is in great shape.</p>
    <a class="btn" href="/">Back to Home</a>
    <a class="phone" href="tel:+17049992808">Or call/text 704-999-2808</a>
  </div>
</body>
</html>
